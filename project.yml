name: SmartKitDemo
options:
  bundleIdPrefix: com.kollist
  deploymentTarget:
    iOS: "17.0"
packages:
  SmartKit:
    url: https://github.com/kollist/SmartKit.git
    branch: main
targets:
  SmartKitDemo:
    type: application
    platform: iOS
    sources:
      - SmartKitDemo
    dependencies:
      - package: SmartKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kollist.SmartKitDemo
        PRODUCT_NAME: SmartKitDemo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
schemes:
  SmartKitDemo:
    build:
      targets:
        SmartKitDemo: all
    run:
      config: Debug
    shared: true
